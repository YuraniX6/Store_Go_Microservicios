version: '3.8'

services:
  auth-service:
    image: auth-service:latest
    container_name: auth-service
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-storego_auth}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-YXV0aEtzZWNyZXRrZXlmb3JzdG9yZWdvbWljcm9zZXJ2aWNlYXV0aGVudGljYXRpb24=}
    depends_on:
      - postgres
    networks:
      - storego-network

  postgres:
    image: postgres:15-alpine
    container_name: postgres-auth
    environment:
      POSTGRES_DB: ${DB_NAME:-storego_auth}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - storego-network

volumes:
  postgres_data:

networks:
  storego-network:
    driver: bridge
