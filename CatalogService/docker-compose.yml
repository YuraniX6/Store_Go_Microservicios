version: '3.9'

services:
  catalog-service:
    build: .
    container_name: catalog-service
    ports:
      - "8083:8083"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/catalog_db
      DB_USERNAME: catalog_user
      DB_PASSWORD: catalog_pass
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - catalog-network
    restart: on-failure

  postgres:
    image: postgres:15-alpine
    container_name: catalog-postgres
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_pass
    ports:
      - "5433:5432"
    volumes:
      - catalog_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog_user -d catalog_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - catalog-network

volumes:
  catalog_postgres_data:

networks:
  catalog-network:
    driver: bridge
