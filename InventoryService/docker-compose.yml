version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: storego_inventory_db
    environment:
      POSTGRES_DB: storego_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d storego_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - storego-network

  inventory-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: storego_inventory_service
    environment:
      SPRING_PROFILES_ACTIVE: default
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: storego_inventory
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: your-storego-jwt-secret-change-in-production
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - storego-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  storego-network:
    driver: bridge
